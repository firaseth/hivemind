# HiveMind consensus accuracy eval
description: "HiveMind consensus accuracy eval"

prompts:
  - "Act as the HiveMind Swarm. Goal: {{goal}}. Provide a structured plan and confidence score."

providers:
  - id: ollama:qwen2.5:1.5b

tests:
  - description: "Simple planning task"
    vars:
      goal: "Plan a birthday party within $500"
    assert:
      - type: contains
        value: "budget"
      - type: javascript
        value: output.confidence > 0.7
